<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split-Brain Portal - Behavioral Cockpit</title>
  <meta name="description" content="Split-Brain Portal is a personal behavioral cockpit and emotion matrix dashboard, providing real-time cognitive logs, emotion analysis, and entity tracking powered by Gemini and Groq (Llama) models, synced securely with Google Sheets.">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Inter & Outfit Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0b0f;
    }
    h1, h2, h3, h4, .font-display {
      font-family: 'Outfit', sans-serif;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    /* Pulsing animations */
    @keyframes subtle-pulse {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.05); }
    }
    .backdrop-glow {
      animation: subtle-pulse 8s infinite ease-in-out;
    }
    /* Date input custom styles */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen relative overflow-x-hidden">

  <!-- Dynamic Backdrop Glow Effects -->
  <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-cyan-500/10 blur-[120px] pointer-events-none backdrop-glow"></div>
  <div class="absolute top-[40%] left-[30%] w-[550px] h-[550px] rounded-full bg-indigo-500/5 blur-[130px] pointer-events-none backdrop-glow" style="animation-delay: 1.5s;"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-purple-500/10 blur-[150px] pointer-events-none backdrop-glow" style="animation-delay: 3s;"></div>

  <div id="root"></div>

  <!-- React Babel Application -->
  <script type="text/babel" data-type="module">
    import { analyzeLogsWithGemini, askMyBrain, generateDeepInsights, classifyLogsEmotionGemini } from './LLMService.js?v=11';
    import { extractEntitiesWithOracle, askPulseWithGroq, classifyLogsEmotion } from './LLMService_Oracle.js?v=11';

    const { useState, useEffect, useRef, useMemo } = React;

    // Standard preset HSL states (10 categories with emojis)
    const HSL_COLOR_PRESETS = [
      { name: 'Productive', emoji: '🚀', color: 'hsl(142, 70%, 45%)', border: 'border-emerald-500/30', glow: 'shadow-emerald-500/20', textColor: 'text-emerald-400', bg: 'bg-emerald-500/10' },
      { name: 'Calm', emoji: '🧘', color: 'hsl(199, 80%, 48%)', border: 'border-sky-500/30', glow: 'shadow-sky-500/20', textColor: 'text-sky-400', bg: 'bg-sky-500/10' },
      { name: 'Grateful', emoji: '🙏', color: 'hsl(45, 90%, 50%)', border: 'border-amber-500/30', glow: 'shadow-amber-500/20', textColor: 'text-amber-400', bg: 'bg-amber-500/10' },
      { name: 'Energetic', emoji: '⚡', color: 'hsl(328, 95%, 50%)', border: 'border-pink-500/30', glow: 'shadow-pink-500/20', textColor: 'text-pink-400', bg: 'bg-pink-500/10' },
      { name: 'Hopeful', emoji: '🌅', color: 'hsl(32, 95%, 48%)', border: 'border-orange-500/30', glow: 'shadow-orange-500/20', textColor: 'text-orange-400', bg: 'bg-orange-500/10' },
      { name: 'Stressed', emoji: '🤯', color: 'hsl(0, 85%, 50%)', border: 'border-red-500/30', glow: 'shadow-red-500/20', textColor: 'text-red-400', bg: 'bg-red-500/10' },
      { name: 'Anxious', emoji: '😰', color: 'hsl(22, 90%, 52%)', border: 'border-orange-600/30', glow: 'shadow-orange-600/20', textColor: 'text-orange-500', bg: 'bg-orange-600/10' },
      { name: 'Sad', emoji: '😔', color: 'hsl(255, 75%, 55%)', border: 'border-indigo-500/30', glow: 'shadow-indigo-500/20', textColor: 'text-indigo-400', bg: 'bg-indigo-500/10' },
      { name: 'Angry', emoji: '🔥', color: 'hsl(12, 95%, 48%)', border: 'border-rose-500/30', glow: 'shadow-rose-500/20', textColor: 'text-rose-400', bg: 'bg-rose-500/10' },
      { name: 'Lazy', emoji: '🛋️', color: 'hsl(210, 90%, 50%)', border: 'border-blue-500/30', glow: 'shadow-blue-500/20', textColor: 'text-blue-400', bg: 'bg-blue-500/10' }
    ];

    const PRESET_KEYWORDS = {
      'Productive': ['focus', 'work', 'code', 'productive', 'study', 'accomplished', 'goal', 'completed', 'writing', 'tasks', 'progress', 'design', 'development', 'programming', 'building'],
      'Calm': ['calm', 'peaceful', 'quiet', 'relax', 'meditate', 'zen', 'serene', 'tranquil', 'chill'],
      'Grateful': ['grateful', 'thankful', 'blessed', 'appreciate', 'happy', 'love', 'kindness'],
      'Energetic': ['energetic', 'excited', 'hyped', 'motivate', 'workout', 'run', 'gym', 'active', 'power', 'pumped'],
      'Hopeful': ['hopeful', 'optimistic', 'future', 'looking forward', 'excited', 'faith', 'dream'],
      'Stressed': ['stressed', 'overwhelmed', 'pressure', 'deadline', 'busy', 'heavy', 'tired'],
      'Anxious': ['anxious', 'anxiety', 'worried', 'nervous', 'fear', 'panic', 'scared', 'dread'],
      'Sad': ['sad', 'unhappy', 'depressed', 'gloomy', 'cry', 'lonely', 'miss', 'heavy heart'],
      'Angry': ['angry', 'frustrated', 'mad', 'annoyed', 'furious', 'rage', 'hate', 'irritated'],
      'Lazy': ['lazy', 'rest', 'chill', 'procrastinate', 'sleep', 'bed', 'movie', 'game', 'nothing', 'sluggish', 'idle', 'relaxed', 'napping']
    };

    const INITIAL_STATE_RULES = HSL_COLOR_PRESETS.map(preset => ({
      name: preset.name,
      emoji: preset.emoji,
      color: preset.color,
      border: preset.border,
      glow: preset.glow,
      textColor: preset.textColor,
      bg: preset.bg,
      keywords: PRESET_KEYWORDS[preset.name] || [preset.name.toLowerCase()]
    }));



    // Helper to extract circle people, products, websites, software, projects from logs and Oracle entities
    const extractCirclePeople = (logs, oracleEntities = [], categoryOverrides = {}) => {
      const whitelist = [
        { name: 'Dad', category: 'Family', pattern: /\b(dad|father)\b/i },
        { name: 'Mom', category: 'Family', pattern: /\b(mom|mother)\b/i },
        { name: 'Rayan', category: 'Friends', pattern: /\brayan\b/i },
        { name: 'Asma', category: 'Partner', pattern: /\basma\b/i },
        { name: 'Hamdan', category: 'Friends', pattern: /\bhamdan\b/i },
        { name: 'Parents', category: 'Family', pattern: /\bparents\b/i },
        { name: 'T', category: 'Work', pattern: /\bT\b/ } // case-sensitive for single letter T
      ];

      const entitiesMap = {};
      const safeLogs = Array.isArray(logs) ? logs : [];

      // 1. Process whitelist matches from local logs (always added as people)
      safeLogs.forEach(log => {
        const text = log.content || '';
        const date = log.date || 'Unknown Date';
        
        let valence = 'neutral';
        const emotion = (log.dominant_emotion || 'Lazy').toLowerCase();
        if (['focus', 'reflection'].includes(emotion)) valence = 'positive';
        if (['anxiety', 'burnout'].includes(emotion)) valence = 'negative';

        whitelist.forEach(person => {
          if (person.pattern.test(text)) {
            const name = person.name;
            const category = categoryOverrides[name] || person.category;
            if (!entitiesMap[name]) {
              entitiesMap[name] = {
                name: name,
                category: category,
                mentions: []
              };
            } else if (categoryOverrides[name]) {
              entitiesMap[name].category = categoryOverrides[name];
            }
            const alreadyMentioned = entitiesMap[name].mentions.some(m => m.content === text);
            if (!alreadyMentioned) {
              entitiesMap[name].mentions.push({
                date: date,
                valence: valence,
                content: text,
                mood: emotion === 'focus' ? '6/7' : emotion === 'reflection' ? '5/7' : emotion === 'anxiety' ? '3/7' : emotion === 'burnout' ? '2/7' : '4/7'
              });
            }
          }
        });
      });

      // 2. Process all oracle entities (including whitelisted people and products/software/websites/projects)
      const safeOracleEntities = Array.isArray(oracleEntities) ? oracleEntities : [];
      safeOracleEntities.forEach(e => {
        if (!e.name || !e.context) return;
        const oracleName = e.name.trim();
        const lowerOracleName = oracleName.toLowerCase();
        
        // Find if this oracle name matches any of our whitelisted people
        let matchedPerson = null;
        whitelist.forEach(person => {
          const isMatch = (person.name.toLowerCase() === lowerOracleName) || 
                          (person.name === 'Dad' && (lowerOracleName === 'father' || lowerOracleName === 'dad')) ||
                          (person.name === 'Mom' && (lowerOracleName === 'mother' || lowerOracleName === 'mom'));
          if (isMatch) {
            matchedPerson = person;
          }
        });

        // Determine category based on type or fallback rules
        let category = null;
        let isWhitelistedPerson = !!matchedPerson;

        // If type is explicitly provided by the LLM
        if (e.type) {
          const typeLower = e.type.toLowerCase();
          if (typeLower === 'person') {
            if (isWhitelistedPerson) {
              category = matchedPerson.category;
            } else {
              // Ignore non-whitelisted people to prevent general vocabulary cluttering
              return;
            }
          } else if (typeLower === 'product') {
            category = 'Product';
          } else if (typeLower === 'website') {
            category = 'Website';
          } else if (typeLower === 'software') {
            category = 'Software';
          } else if (typeLower === 'project') {
            category = 'Project';
          } else {
            category = 'Project'; // default for other
          }
        } else {
          // Fallback if no type is provided
          if (isWhitelistedPerson) {
            category = matchedPerson.category;
          } else {
            // Check context & name to infer type
            const contextLower = e.context.toLowerCase();
            if (lowerOracleName.includes('.com') || lowerOracleName.includes('.org') || lowerOracleName.includes('.net') || lowerOracleName.includes('http') || contextLower.includes('website') || contextLower.includes('site') || contextLower.includes('url')) {
              category = 'Website';
            } else if (lowerOracleName.includes('software') || lowerOracleName.includes('app') || contextLower.includes('software') || contextLower.includes('application') || contextLower.includes('tool') || contextLower.includes('engine')) {
              category = 'Software';
            } else if (lowerOracleName.includes('product') || contextLower.includes('product') || contextLower.includes('wearable') || contextLower.includes('device')) {
              category = 'Product';
            } else {
              category = 'Project';
            }
          }
        }

        if (!category) return;

        // Determine the final name (normalize whitelist to standard name, capitalize non-whitelist)
        const finalName = isWhitelistedPerson 
          ? matchedPerson.name 
          : oracleName.charAt(0).toUpperCase() + oracleName.slice(1);

        const finalCategory = categoryOverrides[finalName] || category;

        if (!entitiesMap[finalName]) {
          entitiesMap[finalName] = {
            name: finalName,
            category: finalCategory,
            mentions: []
          };
        } else {
          entitiesMap[finalName].category = finalCategory;
        }

        // Find matching original log content to display full context under Circle & DNA
        let matchedLogText = e.context || '';
        if (Array.isArray(logs) && logs.length > 0) {
          const matchingLog = logs.find(l => {
            const lDate = l.date || l.Date || '';
            const lContent = (l.content || l.Content || '').toLowerCase();
            const eNameLower = oracleName.toLowerCase();
            const eContextLower = (e.context || '').toLowerCase();
            return lDate === e.date && (lContent.includes(eNameLower) || lContent.includes(eContextLower));
          }) || logs.find(l => {
            const lContent = (l.content || l.Content || '').toLowerCase();
            const eNameLower = oracleName.toLowerCase();
            const eContextLower = (e.context || '').toLowerCase();
            return lContent.includes(eNameLower) || lContent.includes(eContextLower);
          });
          
          if (matchingLog) {
            matchedLogText = matchingLog.content || matchingLog.Content || matchedLogText;
          }
        }

        const hasContext = entitiesMap[finalName].mentions.some(m => m.content === matchedLogText);
        if (!hasContext) {
          entitiesMap[finalName].mentions.push({
            date: e.date || getLocalTodayStr(),
            valence: e.valence || 'neutral',
            content: matchedLogText,
            mood: e.valence === 'positive' ? '6/7' : e.valence === 'negative' ? '2/7' : '4/7'
          });
        }
      });

      return Object.values(entitiesMap).map(p => {
        p.mentions.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        let posCount = 0;
        let negCount = 0;
        let neuCount = 0;
        p.mentions.forEach(m => {
          if (m.valence === 'positive') posCount++;
          else if (m.valence === 'negative') negCount++;
          else neuCount++;
        });
        
        let overallValence = 'neutral';
        if (posCount > negCount) overallValence = 'positive';
        if (negCount > posCount) overallValence = 'negative';

        let timeAgo = 'unknown';
        if (p.mentions.length > 0) {
          const diffTime = Math.abs(new Date() - new Date(p.mentions[0].date));
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          if (diffDays <= 1) timeAgo = 'today';
          else if (diffDays < 7) timeAgo = `${diffDays}d ago`;
          else timeAgo = `${Math.floor(diffDays / 7)}w ago`;
        }

        return {
          ...p,
          valence: overallValence,
          posCount: posCount,
          negCount: negCount,
          neuCount: neuCount,
          timeAgo: timeAgo,
          mentionCount: p.mentions.length
        };
      }).filter(p => p.mentionCount > 0);
    };

    // Date & Time Helpers in local device timezone to prevent offset shifting
    function getLocalTodayStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getLocalTimestampStr(customDateStr) {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const datePart = customDateStr || getLocalTodayStr();
      return `${datePart}T${hours}:${minutes}:${seconds}Z`;
    }

    function formatLocalDateStr(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function App() {
      // 1. Navigation View State
      const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard' | 'daily-pulse' | 'settings'
      
      // 2. Configuration State (LocalStorage)
      const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('sb_gemini_key') || '');
      const [groqApiKey, setGroqApiKey] = useState(() => localStorage.getItem('sb_groq_key') || '');
      const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('sb_gas_url') || '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]');

      // 3. Core Logs State
      const [logs, setLogs] = useState(() => {
        const stored = localStorage.getItem('splitbrain_logs_v3');
        return stored ? JSON.parse(stored) : [];
      });

      // 4. Sheets Sync State
      const [isSyncingSheets, setIsSyncingSheets] = useState(false);
      const [sheetsSyncError, setSheetsSyncError] = useState(null);

      // 5. Circle / Relationship View State
      const [circleSearchQuery, setCircleSearchQuery] = useState('');
      const [circleCategoryFilter, setCircleCategoryFilter] = useState('All');
      const [circleSortOrder, setCircleSortOrder] = useState('Recent');
      const [selectedCirclePerson, setSelectedCirclePerson] = useState(null);

      const [activeCategories, setActiveCategories] = useState(INITIAL_STATE_RULES);

      // 7. Daily Pulse State & Ref
      const [dailyPulseText, setDailyPulseText] = useState('');
      const [dailyPulseStatus, setDailyPulseStatus] = useState('idle'); // 'idle' | 'saving' | 'success' | 'error'
      const [selectedPulseDate, setSelectedPulseDate] = useState(getLocalTodayStr);
      const pulseTextareaRef = useRef(null);

      // 8. Q&A Box State
      const [askQuery, setAskQuery] = useState('');
      const [askResponse, setAskResponse] = useState(null);
      const [askLoading, setAskLoading] = useState(false);
      
      // 9. Oracle Macro Insights & Sync Status
      const [oracleInsights, setOracleInsights] = useState(() => {
        const stored = localStorage.getItem('splitbrain_oracle_insights_v3');
        return stored ? JSON.parse(stored) : null;
      });
      const [isSyncingOracle, setIsSyncingOracle] = useState(false);

      // 10. Day Spotlight Modal State
      const [selectedSpotlightDay, setSelectedSpotlightDay] = useState(null);

      // 11. Speech to Text State & Ref
      const [isDictating, setIsDictating] = useState(false);
      const recognitionRef = useRef(null);

      // 13. Batch Emotion Classification Status
      const [isClassifyingEmotions, setIsClassifyingEmotions] = useState(false);

      console.log("AskPulse received logs type:", typeof logs, "Is Array?", Array.isArray(logs), logs);

      // 12. Entity Category Overrides
      const [entityCategoryOverrides, setEntityCategoryOverrides] = useState(() => {
        const stored = localStorage.getItem('sb_category_overrides');
        return stored ? JSON.parse(stored) : {};
      });

      const handleUpdateEntityCategory = (name, newCategory) => {
        setEntityCategoryOverrides(prev => {
          const updated = { ...prev, [name]: newCategory };
          localStorage.setItem('sb_category_overrides', JSON.stringify(updated));
          return updated;
        });
      };

      const circlePeople = useMemo(() => {
        return extractCirclePeople(logs, oracleInsights?.extracted_entities || [], entityCategoryOverrides);
      }, [logs, oracleInsights, entityCategoryOverrides]);

      const activeCirclePerson = useMemo(() => {
        if (!selectedCirclePerson) return null;
        return circlePeople.find(p => p.name === selectedCirclePerson.name) || selectedCirclePerson;
      }, [circlePeople, selectedCirclePerson]);

      const filteredCirclePeople = useMemo(() => {
        let list = [...circlePeople];
        
        // Search Filter
        if (circleSearchQuery.trim()) {
          const q = circleSearchQuery.toLowerCase();
          list = list.filter(p => p.name.toLowerCase().includes(q));
        }

        // Category Filter
        if (circleCategoryFilter !== 'All') {
          list = list.filter(p => p.category === circleCategoryFilter);
        }

        // Sort Order
        if (circleSortOrder === 'Recent') {
          list.sort((a, b) => new Date(b.mentions[0].date) - new Date(a.mentions[0].date));
        } else if (circleSortOrder === 'Most here') {
          list.sort((a, b) => b.mentionCount - a.mentionCount);
        } else if (circleSortOrder === 'A -> Z') {
          list.sort((a, b) => a.name.localeCompare(b.name));
        }

        return list;
      }, [circlePeople, circleSearchQuery, circleCategoryFilter, circleSortOrder]);

      // Inline CSV parser for fallback
      const parseCSV = (text) => {
        const lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const nextChar = text[i + 1];
          if (char === String.fromCharCode(34)) {
            if (inQuotes && nextChar === String.fromCharCode(34)) {
              row[row.length - 1] += String.fromCharCode(34);
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push("");
          } else if ((char === '\r' || char === '\n') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') {
              i++;
            }
            lines.push(row);
            row = [""];
          } else {
            row[row.length - 1] += char;
          }
        }
        if (row.length > 1 || row[0] !== "") {
          lines.push(row);
        }
        if (lines.length < 2) return [];
        const rawHeaders = lines[0].map(h => h.trim());
        const objects = [];
        for (let i = 1; i < lines.length; i++) {
          const values = lines[i];
          if (values.length === 1 && values[0] === "") continue;
          const obj = {};
          for (let j = 0; j < rawHeaders.length; j++) {
            const headerName = rawHeaders[j];
            const val = values[j] !== undefined ? values[j] : "";
            obj[headerName] = val;
          }
          objects.push(obj);
        }
        return objects;
      };

      // Robust Log Normalizer
      const normalizeLog = (log) => {
        // Detect and fix column offset mismatch (e.g. if sheet has only [Date, Stream, Content] and no headers)
        // in which case the Google Apps Script reads them as: timestamp=Date, date=Stream (e.g. "Journal"), stream=Content, content=undefined
        const isMismatched = 
          (log.timestamp && /^\d{4}-\d{2}-\d{2}/.test(String(log.timestamp))) &&
          (log.date && isNaN(new Date(log.date).getTime())) &&
          (!log.content);
        
        if (isMismatched) {
          log.content = log.stream; // Content was read into stream
          log.stream = log.date;    // Stream was read into date
          log.date = log.timestamp; // Date was read into timestamp
        }

        const getProp = (keys) => {
          for (const key of Object.keys(log)) {
            const normalizedKey = key.toLowerCase().trim().replace(/[\s_]+/g, '');
            for (const target of keys) {
              if (normalizedKey === target.toLowerCase().replace(/[\s_]+/g, '')) {
                return log[key];
              }
            }
          }
          return undefined;
        };

        const content = getProp(['content', 'text', 'journal', 'entry', 'log']) || '';
        const stream = getProp(['stream', 'streamtype', 'stream_type', 'category', 'type']) || 'Journal';
        let dateStr = getProp(['date', 'timestamp', 'time']);

        let dominant_emotion = getProp(['dominant_emotion', 'dominantemotion', 'emotion', 'state']);
        if (!dominant_emotion) {
          // Local keyword-matching fallback classification (since Sheets usually lack emotion column)
          dominant_emotion = 'Lazy';
          const lowerContent = content.toLowerCase();
          const categoriesToCheck = activeCategories || INITIAL_STATE_RULES;
          for (const cat of categoriesToCheck) {
            if (cat.keywords.some(kw => lowerContent.includes(kw))) {
              dominant_emotion = cat.name;
              break;
            }
          }
        }

        if (!dateStr && getProp(['timestamp'])) {
          try {
            const tsStr = String(getProp(['timestamp']));
            const match = tsStr.match(/^(\d{4}-\d{2}-\d{2})/);
            if (match) {
              dateStr = match[1];
            } else {
              const parsedDate = new Date(tsStr);
              if (!isNaN(parsedDate.getTime())) {
                dateStr = formatLocalDateStr(parsedDate);
              }
            }
          } catch (e) {}
        }
        if (!dateStr) {
          dateStr = getLocalTodayStr();
        } else {
          try {
            const match = String(dateStr).match(/^(\d{4}-\d{2}-\d{2})/);
            if (match) {
              dateStr = match[1];
            } else {
              const parsedDate = new Date(dateStr);
              if (!isNaN(parsedDate.getTime())) {
                dateStr = formatLocalDateStr(parsedDate);
              }
            }
          } catch (e) {}
        }

        return {
          date: dateStr,
          stream: stream,
          content: content,
          dominant_emotion: dominant_emotion
        };
      };

      const fetchSheetsData = async (targetUrl = gasUrl) => {
        if (!targetUrl || !targetUrl.trim() || targetUrl === '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]') {
          setSheetsSyncError("Please configure a valid Google Sheets URL in settings.");
          return;
        }
        setIsSyncingSheets(true);
        setSheetsSyncError(null);
        try {
          const response = await fetch(targetUrl);
          if (!response.ok) {
            throw new Error(`HTTP Error: ${response.status}`);
          }
          
          const contentType = response.headers.get("content-type") || "";
          const text = await response.text();
          
          let data;
          if (contentType.includes("application/json") || text.trim().startsWith("[") || text.trim().startsWith("{")) {
            data = JSON.parse(text);
          } else {
            if (text.includes("<!DOCTYPE") || text.includes("<html") || text.includes("<div")) {
              throw new Error("Apps Script URL returned HTML instead of JSON/CSV. Ensure the script is deployed as a Web App with access set to 'Anyone'.");
            }
            data = parseCSV(text);
          }

          console.log("Raw Sheets Data:", data);
          console.log("Fetched data:", data);

          let logsArray = null;
          if (Array.isArray(data)) {
            logsArray = data;
          } else if (data && typeof data === 'object') {
            if (Array.isArray(data.logs)) {
              logsArray = data.logs;
            } else if (data.error) {
              throw new Error(data.error);
            } else {
              const hasKeys = Object.keys(data).some(k => ['content', 'text', 'dominant_emotion', 'emotion', 'date', 'timestamp'].includes(k.toLowerCase().trim().replace(/[\s_]+/g, '')));
              if (hasKeys) {
                logsArray = [data];
              }
            }
          }

          if (logsArray !== null) {
            const normalized = logsArray
              .map(log => normalizeLog(log))
              .filter(log => log.content && log.content.trim() !== "");
            
            setLogs(normalized);

            if (normalized.length === 0) {
              setOracleInsights(null);
              localStorage.removeItem('splitbrain_oracle_insights_v3');
            } else {
              // Trigger batch emotion classification using Llama 3.3 or Gemini to analyze the full article contents
              const triggerBatchClassification = async () => {
                window.userTriggeredAIEvent = true; // allow AI calls
                setIsClassifyingEmotions(true);
                try {
                  let classifications = [];
                  if (groqApiKey && groqApiKey.trim()) {
                    classifications = await classifyLogsEmotion(normalized, groqApiKey, activeCategories.map(c => c.name));
                  } else if (geminiApiKey && geminiApiKey.trim()) {
                    classifications = await classifyLogsEmotionGemini(normalized, geminiApiKey, activeCategories.map(c => c.name));
                  }

                  if (classifications && classifications.length > 0) {
                    const updatedLogs = [...normalized];
                    classifications.forEach(c => {
                      if (updatedLogs[c.index]) {
                        updatedLogs[c.index].dominant_emotion = c.category;
                      }
                    });
                    setLogs(updatedLogs);
                    console.log("Successfully classified logs emotions: ", classifications);
                  }
                } catch (e) {
                  console.error("Batch emotion classification failed:", e);
                } finally {
                  setIsClassifyingEmotions(false);
                }
              };

              setTimeout(triggerBatchClassification, 200);
            }
          } else {
            throw new Error("Invalid response format from Apps Script");
          }
        } catch (err) {
          console.error("Sheets synchronization error:", err);
          setSheetsSyncError(err.message);
        } finally {
          setIsSyncingSheets(false);
        }
      };
      // Note: States moved to the top of the App component to resolve temporal dead zone issues.

      // Save to localStorage when state changes
      useEffect(() => {
        localStorage.setItem('splitbrain_logs_v3', JSON.stringify(logs));
      }, [logs]);

      useEffect(() => {
        if (oracleInsights) {
          localStorage.setItem('splitbrain_oracle_insights_v3', JSON.stringify(oracleInsights));
        }
      }, [oracleInsights]);

      useEffect(() => {
        if (gasUrl && gasUrl !== '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]') {
          fetchSheetsData(gasUrl);
        }
      }, []);

      // Category Resolver
      const resolveStateStyling = (emotionName) => {
        if (!emotionName) {
          return activeCategories.find(c => c.name === 'Lazy') || activeCategories[0];
        }
        const matched = activeCategories.find(c => c.name.toLowerCase() === emotionName.toLowerCase().trim());
        if (matched) return matched;
        return activeCategories.find(c => c.name === 'Lazy') || activeCategories[0];
      };

      // Emotional Matrix Counts (2D Grid calculation)
      const matrixCounts = useMemo(() => {
        const counts = {};
        logs.forEach(log => {
          const emotion = log.dominant_emotion || 'Lazy';
          counts[emotion] = (counts[emotion] || 0) + 1;
        });
        return counts;
      }, [logs]);

      // 28-day grid dates
      const gridDays = useMemo(() => {
        const list = [];
        const today = new Date();
        for (let i = 27; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(today.getDate() - i);
          const dateStr = formatLocalDateStr(d);
          
          // Find matching logs for this date
          const dayLogs = logs.filter(l => l.date === dateStr);
          const dominant = dayLogs.length > 0 ? (dayLogs[0].dominant_emotion || 'Lazy') : null;
          
          list.push({
            date: dateStr,
            hasLog: dayLogs.length > 0,
            dominantEmotion: dominant,
            logs: dayLogs
          });
        }
        return list;
      }, [logs]);

      // Speech-to-Text Setup
      useEffect(() => {
        if (typeof window !== 'undefined' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const rec = new SpeechRecognition();
          rec.continuous = true;
          rec.interimResults = false;
          rec.lang = 'en-US';

          rec.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            setDailyPulseText(prev => prev + (prev ? ' ' : '') + transcript);
          };

          rec.onerror = (e) => {
            console.error('Speech recognition error:', e);
            setIsDictating(false);
          };

          rec.onend = () => {
            setIsDictating(false);
          };

          recognitionRef.current = rec;
        }
      }, []);

      const toggleSpeechDictation = () => {
        if (!recognitionRef.current) {
          alert('Web Speech API is not supported in this browser.');
          return;
        }
        if (isDictating) {
          recognitionRef.current.stop();
        } else {
          setIsDictating(true);
          recognitionRef.current.start();
        }
      };



      // Save Daily Pulse log
      const saveDailyPulse = async () => {
        if (!dailyPulseText.trim()) return;
        setDailyPulseStatus('saving');
        window.userTriggeredAIEvent = true;
        
        // Predict emotion based on keywords locally, or default to Lazy
        let resolvedEmotion = 'Lazy';
        const lowerText = dailyPulseText.toLowerCase();
        for (const cat of activeCategories) {
          if (cat.keywords.some(kw => lowerText.includes(kw))) {
            resolvedEmotion = cat.name;
            break;
          }
        }

        const newLog = {
          timestamp: getLocalTimestampStr(selectedPulseDate),
          date: selectedPulseDate,
          stream: 'Journal',
          content: dailyPulseText,
          dominant_emotion: resolvedEmotion
        };

        try {
          // 1. Optional sync to Google Sheets
          if (gasUrl.trim()) {
            const resp = await fetch(gasUrl, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(newLog)
            });
          }

          // 2. Append/Update local state logs
          setLogs(prev => {
            const filtered = prev.filter(l => l.date !== selectedPulseDate);
            return [newLog, ...filtered];
          });

          // 3. Trigger Gemini categorization analysis if key is set
          if (geminiApiKey.trim()) {
            try {
              const geminiResult = await analyzeLogsWithGemini(
                `Analyze this journal log: "${dailyPulseText}". 
                Categorize it into exactly one of these emotions: Focus, Anxiety, Burnout, Reflection, Lazy. 
                Return ONLY the name of the emotion.`, 
                geminiApiKey
              );
              if (geminiResult) {
                const cleanedEmotion = geminiResult.trim().replace(/[^a-zA-Z]/g, '');
                if (HSL_COLOR_PRESETS.some(p => p.name.toLowerCase() === cleanedEmotion.toLowerCase())) {
                  newLog.dominant_emotion = cleanedEmotion.charAt(0).toUpperCase() + cleanedEmotion.slice(1).toLowerCase();
                  setLogs(prev => {
                    const filtered = prev.filter(l => l.date !== selectedPulseDate);
                    return [newLog, ...filtered];
                  });
                }
              }
            } catch (err) {
              console.error("Gemini classification failed:", err);
            }
          }

          setDailyPulseText('');
          setSelectedPulseDate(getLocalTodayStr());
          setDailyPulseStatus('success');
          setTimeout(() => setDailyPulseStatus('idle'), 3000);
        } catch (e) {
          console.error("Failed synchronization:", e);
          setDailyPulseStatus('error');
          setTimeout(() => setDailyPulseStatus('idle'), 4000);
        }
      };

      // Q&A Box submit (Ask Pulse routed to Groq)
      const executeAskPulse = async () => {
        if (!askQuery.trim()) return;
        setAskLoading(true);
        setAskResponse(null);
        window.userTriggeredAIEvent = true;

        if (!groqApiKey.trim()) {
          // Groq key is offline, use local search fallback immediately
          executeLocalSearchFallback(`Groq Key missing.`);
          return;
        }

        const safeLogs = Array.isArray(logs) ? logs : [];

        try {
          console.log("PAYLOAD AUDIT - Sending to Groq:", JSON.stringify(safeLogs, null, 2));
          const formattedPayload = safeLogs.map(l => `[${l.Date || l.date || 'Unknown Date'}]: ${l.Content || l.content || ''}`).join('\n');
          const result = await askPulseWithGroq(askQuery, formattedPayload, groqApiKey);
          if (result && result.answer) {
            setAskResponse({
              answer: result.answer,
              sources: result.sources || []
            });
          } else {
            throw new Error("Invalid API Response format");
          }
        } catch (err) {
          console.warn("Groq Oracle Q&A failed, falling back to local memory index:", err);
          executeLocalSearchFallback(err.message);
        } finally {
          setAskLoading(false);
        }
      };

      // Local search fallback implementation
      const executeLocalSearchFallback = (errReason) => {
        const safeLogs = Array.isArray(logs) ? logs : [];
        const query = askQuery.toLowerCase();
        const matches = safeLogs.filter(l => (l.content || l.Content || '').toLowerCase().includes(query));
        const matchedDates = matches.map(m => m.date || m.Date || 'Unknown Date');

        setAskResponse({
          answer: `AI Offline. Found ${matches.length} local matches.`,
          sources: matchedDates,
          isFallback: true
        });
      };

      // Trigger Groq Oracle macro analysis
      const syncOracleInsights = async () => {
        if (logs.length === 0) {
          setOracleInsights(null);
          localStorage.removeItem('splitbrain_oracle_insights_v3');
          return;
        }
        if (!groqApiKey.trim()) {
          alert("Configure a valid Groq API Key in settings first.");
          return;
        }
        setIsSyncingOracle(true);
        window.userTriggeredAIEvent = true;

        try {
          const result = await extractEntitiesWithOracle(logs, groqApiKey, activeCategories.map(c => c.name));
          if (result) {
            setOracleInsights(result);
          }
        } catch (err) {
          alert(`Sync failed: ${err.message}`);
        } finally {
          setIsSyncingOracle(false);
        }
      };

      // Save Settings
      const saveSettings = () => {
        localStorage.setItem('sb_gemini_key', geminiApiKey);
        localStorage.setItem('sb_groq_key', groqApiKey);
        localStorage.setItem('sb_gas_url', gasUrl);
        alert("Settings synchronized successfully.");
        if (gasUrl && gasUrl !== '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]') {
          fetchSheetsData(gasUrl);
        }
      };

      return (
        <div class="min-h-screen flex flex-col max-w-7xl mx-auto p-4 md:p-6 pb-28 relative z-10">
          
          {/* Top Header */}
          <header class="flex flex-row items-center justify-between border-b border-white/5 pb-5 mb-8 gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-400 to-purple-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <span class="font-display font-black text-lg text-white">S</span>
              </div>
              <div>
                <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-100 to-gray-400 bg-clip-text text-transparent">
                  SPLIT-BRAIN PORTAL
                </h1>
                <p class="text-[10px] text-gray-500 tracking-wider uppercase font-semibold">Behavioral Cockpit v3.0</p>
              </div>
            </div>

            <div class="flex items-center gap-2 px-3 py-1.5 bg-white/[0.02] border border-white/5 rounded-full backdrop-blur-md">
              <span class={`w-2.5 h-2.5 rounded-full ${gasUrl && gasUrl !== '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]' ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></span>
              <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                {gasUrl && gasUrl !== '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]' ? 'Cloud Sync Active' : 'Offline Mode'}
              </span>
            </div>
          </header>

          {/* Core Panel Content */}
          <main class="flex-grow">
            
            {/* VIEW 1: COCKPIT (DASHBOARD) */}
            {currentView === 'dashboard' && (
              <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                {/* Left Panel: Emotion Matrix & Ask Pulse */}
                <div class="lg:col-span-2 flex flex-col gap-6">
                  
                  {/* Vivid Emotional Matrix */}
                  <section class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-6 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                      <div>
                        <h2 class="text-xl font-bold text-white flex items-center gap-2">
                          <span class={`w-2.5 h-2.5 rounded-full ${isClassifyingEmotions ? 'bg-purple-500 animate-ping' : 'bg-cyan-500 animate-pulse'}`}></span>
                          VIVID EMOTIONAL MATRIX
                          {isClassifyingEmotions && <span class="text-xs text-purple-400 font-medium animate-pulse ml-1">(Classifying emotions...)</span>}
                          <button
                            onClick={() => fetchSheetsData()}
                            disabled={isSyncingSheets || isClassifyingEmotions}
                            class="ml-2 p-1.5 hover:bg-white/10 rounded-lg text-gray-400 hover:text-white transition-all disabled:opacity-50 flex items-center justify-center border border-transparent hover:border-white/10"
                            title="Sync logs from Google Sheets">
                            <svg class={`w-4 h-4 ${isSyncingSheets ? 'animate-spin text-cyan-400' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2" />
                            </svg>
                          </button>
                        </h2>
                        <p class="text-xs text-gray-400 mt-1">28-day behavioral state grid mapping. Click square to spotlight.</p>
                      </div>
                      
                      {/* Presets Legends */}
                      <div class="flex flex-wrap gap-2 text-[10px]">
                        {activeCategories.map(cat => (
                          <div key={cat.name} class="flex items-center gap-1.5 px-2 py-1 rounded bg-white/5 border border-white/5">
                            <span class="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }}></span>
                            <span class="text-gray-300 font-medium">{cat.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Matrix Grid Representation */}
                    <div class="grid grid-cols-7 sm:grid-cols-14 gap-3 mb-4">
                      {gridDays.map((day, idx) => {
                        const style = day.dominantEmotion ? resolveStateStyling(day.dominantEmotion) : null;
                        const dateObj = new Date(day.date);
                        const label = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                        
                        return (
                          <button
                            key={day.date}
                            onClick={() => setSelectedSpotlightDay(day)}
                            class={`aspect-square rounded-xl flex flex-col items-center justify-between p-2 transition-all relative group border hover:scale-105 ${
                              day.hasLog 
                                ? `${style?.border} ${style?.bg} hover:border-white/40`
                                : 'border-white/5 bg-white/[0.02] text-gray-600 hover:border-white/20'
                            }`}
                            title={`${day.date}: ${day.dominantEmotion || 'No log'}`}>
                            
                            <span class="text-[9px] text-gray-500 group-hover:text-white font-mono self-start">{idx + 1}</span>
                            
                            {day.hasLog ? (
                              <span 
                                class="w-3.5 h-3.5 rounded-full shadow-lg"
                                style={{ 
                                  backgroundColor: style?.color, 
                                  boxShadow: `0 0 8px ${style?.color}` 
                                }}></span>
                            ) : (
                              <span class="w-1.5 h-1.5 rounded-full bg-white/5"></span>
                            )}
                            
                            <span class="text-[8px] text-gray-400 mt-1 truncate w-full text-center group-hover:text-white">{label}</span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Loading & Empty Sync States */}
                    {isSyncingSheets && (
                      <div class="text-center py-8 border border-white/5 rounded-xl bg-white/[0.01]">
                        <span class="w-6 h-6 border-2 border-white/20 border-t-cyan-400 rounded-full animate-spin inline-block mb-2"></span>
                        <p class="text-xs text-gray-400">Syncing log entries from Google Sheets...</p>
                      </div>
                    )}

                    {sheetsSyncError && (
                      <div class="text-center py-6 border border-red-500/10 rounded-xl bg-red-500/5 mt-2">
                        <p class="text-xs text-red-400">Sync Error: {sheetsSyncError}</p>
                        <div class="flex gap-2 justify-center mt-2">
                          <button
                            onClick={() => fetchSheetsData()}
                            class="text-[10px] px-3 py-1 bg-red-500/10 border border-red-500/20 text-red-400 font-semibold rounded-lg hover:bg-red-500/20 transition-all">
                            Retry Pull
                          </button>
                          <button
                            onClick={() => fetchSheetsData()}
                            class="text-[10px] px-3 py-1 bg-purple-500/10 border border-purple-500/20 text-purple-400 font-semibold rounded-lg hover:bg-purple-500/20 transition-all">
                            Force Sheet Sync
                          </button>
                        </div>
                      </div>
                    )}

                    {logs.length === 0 && !isSyncingSheets && !sheetsSyncError && (
                      <div class="text-center py-8 border border-dashed border-white/10 rounded-xl bg-white/[0.01] mt-2">
                        <p class="text-sm text-gray-500 mb-2">No synchronized logs found in memory.</p>
                        {gasUrl && gasUrl !== '[PASTE_YOUR_NEW_WEB_APP_URL_HERE]' ? (
                          <div class="flex gap-2.5 justify-center">
                            <button
                              onClick={() => fetchSheetsData()}
                              class="text-xs px-3.5 py-1.5 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-semibold rounded-lg hover:bg-cyan-500/20 transition-all">
                              Pull logs from Google Sheets
                            </button>
                            <button
                              onClick={() => fetchSheetsData()}
                              class="text-xs px-3.5 py-1.5 bg-purple-500/10 border border-purple-500/30 text-purple-400 font-semibold rounded-lg hover:bg-purple-500/20 transition-all">
                              Force Sheet Sync
                            </button>
                          </div>
                        ) : (
                          <p class="text-xs text-purple-400">
                            Configure your Google Sheets URL in <button onClick={() => setCurrentView('settings')} class="underline hover:text-purple-300 font-bold">Settings</button> to sync logs.
                          </p>
                        )}
                      </div>
                    )}
                  </section>

                  {/* Vivid Emotion Stats Cards Grid */}
                  <section class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-6">
                    <h3 class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-4">Behavioral State Totals</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                      {activeCategories.map(cat => {
                        const count = matrixCounts[cat.name] || 0;
                        return (
                          <div 
                            key={cat.name} 
                            class={`border ${cat.border} ${cat.bg} rounded-xl p-3.5 flex items-center justify-between transition-all duration-300 hover:-translate-y-0.5 hover:scale-[1.03] ${cat.glow}`}>
                            <div class="flex items-center gap-2">
                              <span class="text-xl">{cat.emoji || '⚪'}</span>
                              <div class="flex flex-col">
                                <span class="text-xs font-bold text-white leading-none mb-0.5">{cat.name}</span>
                              </div>
                            </div>
                            <span class="text-lg font-black text-white">{count}</span>
                          </div>
                        );
                      })}
                    </div>
                  </section>

                  {/* Ask Pulse Q&A Engine (Combined in Cockpit) */}
                  <section class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-6">
                    <div class="mb-6">
                      <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        PULSE VAULT SEARCH
                      </h2>
                      <p class="text-xs text-gray-400 mt-1">Interrogate your behavior database. Ask questions about patterns, projects, or feelings.</p>
                    </div>

                    <div class="flex gap-2.5 mb-5">
                      <input 
                        type="text"
                        value={askQuery}
                        onChange={(e) => setAskQuery(e.target.value)}
                        placeholder="e.g. When did I mention feeling burned out last week?"
                        class="flex-grow bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition-all text-white placeholder-gray-500 font-medium"
                      />
                      <button
                        onClick={executeAskPulse}
                        disabled={askLoading || !askQuery.trim()}
                        class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 disabled:opacity-50 text-white font-medium px-6 py-3 rounded-xl transition-all shadow-md shadow-purple-500/10 flex items-center gap-2">
                        {askLoading ? (
                          <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        ) : 'Query'}
                      </button>
                    </div>

                    {/* AI Response Core Box */}
                    {askResponse && (
                      <div class="bg-black/30 border border-white/5 rounded-xl p-5 mb-4 transition-all duration-300">
                        <div class="flex items-center justify-between mb-3.5 border-b border-white/5 pb-2">
                          <span class="text-xs font-bold tracking-wider text-purple-400 uppercase">
                            {askResponse.isFallback ? 'Local Search Sync' : 'Groq Oracle Response'}
                          </span>
                          <span class="text-[10px] text-gray-500">Just Now</span>
                        </div>
                        <p class="text-sm leading-relaxed text-gray-200 font-medium">
                          {askResponse.answer}
                        </p>
                      </div>
                    )}

                    {/* Supporting Source Memories */}
                    {askResponse && askResponse.sources && askResponse.sources.length > 0 && (
                      <div>
                        <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2.5">Supporting Source Memories</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {askResponse.sources.map(srcDate => {
                            const matchingLog = logs.find(l => l.date === srcDate);
                            if (!matchingLog) return null;
                            return (

function doPost(e) {
  try {

        aes_shield_masked: maskedVal
      });
    }
    
    logs.sort((a, b) => new Date(b.date || b.timestamp) - new Date(a.date || a.timestamp));
    
    return ContentService.createTextOutput(JSON.stringify(logs))
      .setMimeType(ContentService.MimeType.JSON);
      
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({
      success: false,
      error: error.toString()
    })).setMimeType(ContentService.MimeType.JSON);
  }
}`);
                              alert("Apps Script code copied to clipboard!");
                            }}
