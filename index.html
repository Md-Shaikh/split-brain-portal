  <div id="root" class="w-full overflow-x-hidden"></div>

  <!-- React Babel Application -->
  <script type="text/babel" data-type="module">
    /* @jsxRuntime classic */
    import { analyzeLogsWithGemini, askMyBrain, generateDeepInsights, classifyLogsEmotionGemini } from './LLMService.js?v=11';
    import { extractEntitiesWithOracle, askPulseWithGroq, classifyLogsEmotion } from './LLMService_Oracle.js?v=11';
    import { supabase } from './supabaseClient.js';

    const { useState, useEffect, useRef, useMemo } = React;

    // Standard preset HSL states (10 categories with emojis)
    const HSL_COLOR_PRESETS = [
      { name: 'Productive', emoji: '🚀', color: 'hsl(142, 70%, 45%)', border: 'border-emerald-500/30', glow: 'shadow-emerald-500/20', textColor: 'text-emerald-400', bg: 'bg-emerald-500/10' },
      { name: 'Calm', emoji: '🧘', color: 'hsl(199, 80%, 48%)', border: 'border-sky-500/30', glow: 'shadow-sky-500/20', textColor: 'text-sky-400', bg: 'bg-sky-500/10' },
      { name: 'Grateful', emoji: '🙏', color: 'hsl(45, 90%, 50%)', border: 'border-amber-500/30', glow: 'shadow-amber-500/20', textColor: 'text-amber-400', bg: 'bg-amber-500/10' },
      { name: 'Energetic', emoji: '⚡', color: 'hsl(328, 95%, 50%)', border: 'border-pink-500/30', glow: 'shadow-pink-500/20', textColor: 'text-pink-400', bg: 'bg-pink-500/10' },
      { name: 'Hopeful', emoji: '🌅', color: 'hsl(32, 95%, 48%)', border: 'border-orange-500/30', glow: 'shadow-orange-500/20', textColor: 'text-orange-400', bg: 'bg-orange-500/10' },
      { name: 'Stressed', emoji: '🤯', color: 'hsl(0, 85%, 50%)', border: 'border-red-500/30', glow: 'shadow-red-500/20', textColor: 'text-red-400', bg: 'bg-red-500/10' },
      { name: 'Anxious', emoji: '😰', color: 'hsl(22, 90%, 52%)', border: 'border-orange-600/30', glow: 'shadow-orange-600/20', textColor: 'text-orange-500', bg: 'bg-orange-600/10' },
      { name: 'Sad', emoji: '😔', color: 'hsl(255, 75%, 55%)', border: 'border-indigo-500/30', glow: 'shadow-indigo-500/20', textColor: 'text-indigo-400', bg: 'bg-indigo-500/10' },
      { name: 'Angry', emoji: '🔥', color: 'hsl(12, 95%, 48%)', border: 'border-rose-500/30', glow: 'shadow-rose-500/20', textColor: 'text-rose-400', bg: 'bg-rose-500/10' },
      { name: 'Lazy', emoji: '🛋️', color: 'hsl(210, 90%, 50%)', border: 'border-blue-500/30', glow: 'shadow-blue-500/20', textColor: 'text-blue-400', bg: 'bg-blue-500/10' }
    ];

    const PRESET_KEYWORDS = {
      'Productive': ['focus', 'work', 'code', 'productive', 'study', 'accomplished', 'goal', 'completed', 'writing', 'tasks', 'progress', 'design', 'development', 'programming', 'building'],
      'Calm': ['calm', 'peaceful', 'quiet', 'relax', 'meditate', 'zen', 'serene', 'tranquil', 'chill'],
      'Grateful': ['grateful', 'thankful', 'blessed', 'appreciate', 'happy', 'love', 'kindness'],
      'Energetic': ['energetic', 'excited', 'hyped', 'motivate', 'workout', 'run', 'gym', 'active', 'power', 'pumped'],
      'Hopeful': ['hopeful', 'optimistic', 'future', 'looking forward', 'excited', 'faith', 'dream'],
      'Stressed': ['stressed', 'overwhelmed', 'pressure', 'deadline', 'busy', 'heavy', 'tired'],
      'Anxious': ['anxious', 'anxiety', 'worried', 'nervous', 'fear', 'panic', 'scared', 'dread'],
      'Sad': ['sad', 'unhappy', 'depressed', 'gloomy', 'cry', 'lonely', 'miss', 'heavy heart'],
      'Angry': ['angry', 'frustrated', 'mad', 'annoyed', 'furious', 'rage', 'hate', 'irritated'],
      'Lazy': ['lazy', 'rest', 'chill', 'procrastinate', 'sleep', 'bed', 'movie', 'game', 'nothing', 'sluggish', 'idle', 'relaxed', 'napping']
    };

    const INITIAL_STATE_RULES = HSL_COLOR_PRESETS.map(preset => ({
      name: preset.name,
      emoji: preset.emoji,
      color: preset.color,
      border: preset.border,
      glow: preset.glow,
      textColor: preset.textColor,
      bg: preset.bg,
      keywords: PRESET_KEYWORDS[preset.name] || [preset.name.toLowerCase()]
    }));



    // Helper to extract circle people, products, websites, software, projects from logs and Oracle entities
    const extractCirclePeople = (logs, oracleEntities = [], categoryOverrides = {}) => {
      const whitelist = [
        { name: 'Dad', category: 'Family', pattern: /\b(dad|father)\b/i },
        { name: 'Mom', category: 'Family', pattern: /\b(mom|mother)\b/i },
        { name: 'Rayan', category: 'Friends', pattern: /\brayan\b/i },
        { name: 'Asma', category: 'Partner', pattern: /\basma\b/i },
        { name: 'Hamdan', category: 'Friends', pattern: /\bhamdan\b/i },
        { name: 'Parents', category: 'Family', pattern: /\bparents\b/i },
        { name: 'T', category: 'Work', pattern: /\bT\b/ } // case-sensitive for single letter T
      ];

      const entitiesMap = {};
      const safeLogs = Array.isArray(logs) ? logs : [];

      // 1. Process whitelist matches from local logs (always added as people)
      safeLogs.forEach(log => {
        const text = log.content || '';
        const date = log.date || 'Unknown Date';
        
        let valence = 'neutral';
        const emotion = (log.dominant_emotion || 'Lazy').toLowerCase();
        if (['focus', 'reflection'].includes(emotion)) valence = 'positive';
        if (['anxiety', 'burnout'].includes(emotion)) valence = 'negative';

        whitelist.forEach(person => {
          if (person.pattern.test(text)) {
            const name = person.name;
            const category = categoryOverrides[name] || person.category;
            if (!entitiesMap[name]) {
              entitiesMap[name] = {
                name: name,
                category: category,
                mentions: []
              };
            } else if (categoryOverrides[name]) {
              entitiesMap[name].category = categoryOverrides[name];
            }
            const alreadyMentioned = entitiesMap[name].mentions.some(m => m.content === text);
            if (!alreadyMentioned) {
              entitiesMap[name].mentions.push({
                date: date,
                valence: valence,
                content: text,
                mood: emotion === 'focus' ? '6/7' : emotion === 'reflection' ? '5/7' : emotion === 'anxiety' ? '3/7' : emotion === 'burnout' ? '2/7' : '4/7'
              });
            }
          }
        });
      });

      // 2. Process all oracle entities (including whitelisted people and products/software/websites/projects)
      const safeOracleEntities = Array.isArray(oracleEntities) ? oracleEntities : [];
      safeOracleEntities.forEach(e => {
        if (!e.name || !e.context) return;
        const oracleName = e.name.trim();
        const lowerOracleName = oracleName.toLowerCase();
        
        // Find if this oracle name matches any of our whitelisted people
        let matchedPerson = null;
        whitelist.forEach(person => {
          const isMatch = (person.name.toLowerCase() === lowerOracleName) || 
                          (person.name === 'Dad' && (lowerOracleName === 'father' || lowerOracleName === 'dad')) ||
                          (person.name === 'Mom' && (lowerOracleName === 'mother' || lowerOracleName === 'mom'));
          if (isMatch) {
            matchedPerson = person;
          }
        });

        // Determine category based on type or fallback rules
        let category = null;
        let isWhitelistedPerson = !!matchedPerson;

        // If type is explicitly provided by the LLM
        if (e.type) {
          const typeLower = e.type.toLowerCase();
          if (typeLower === 'person') {
            if (isWhitelistedPerson) {
              category = matchedPerson.category;
            } else {
              // Ignore non-whitelisted people to prevent general vocabulary cluttering
              return;
            }
          } else if (typeLower === 'product') {
            category = 'Product';
          } else if (typeLower === 'website') {
            category = 'Website';
          } else if (typeLower === 'software') {
            category = 'Software';
          } else if (typeLower === 'project') {
            category = 'Project';
          } else {
            category = 'Project'; // default for other
          }
        } else {
          // Fallback if no type is provided
          if (isWhitelistedPerson) {
            category = matchedPerson.category;
          } else {
            // Check context & name to infer type
            const contextLower = e.context.toLowerCase();
            if (lowerOracleName.includes('.com') || lowerOracleName.includes('.org') || lowerOracleName.includes('.net') || lowerOracleName.includes('http') || contextLower.includes('website') || contextLower.includes('site') || contextLower.includes('url')) {
              category = 'Website';
            } else if (lowerOracleName.includes('software') || lowerOracleName.includes('app') || contextLower.includes('software') || contextLower.includes('application') || contextLower.includes('tool') || contextLower.includes('engine')) {
              category = 'Software';
            } else if (lowerOracleName.includes('product') || contextLower.includes('product') || contextLower.includes('wearable') || contextLower.includes('device')) {
              category = 'Product';
            } else {
              category = 'Project';
            }
          }
        }

        if (!category) return;

        // Determine the final name (normalize whitelist to standard name, capitalize non-whitelist)
        const finalName = isWhitelistedPerson 
          ? matchedPerson.name 
          : oracleName.charAt(0).toUpperCase() + oracleName.slice(1);

        const finalCategory = categoryOverrides[finalName] || category;

        if (!entitiesMap[finalName]) {
          entitiesMap[finalName] = {
            name: finalName,
            category: finalCategory,
            mentions: []
          };
        } else {
          entitiesMap[finalName].category = finalCategory;
        }

        // Find matching original log content to display full context under Circle & DNA
        let matchedLogText = e.context || '';
        if (Array.isArray(logs) && logs.length > 0) {
          const matchingLog = logs.find(l => {
            const lDate = l.date || l.Date || '';
            const lContent = (l.content || l.Content || '').toLowerCase();
            const eNameLower = oracleName.toLowerCase();
            const eContextLower = (e.context || '').toLowerCase();
            return lDate === e.date && (lContent.includes(eNameLower) || lContent.includes(eContextLower));
          }) || logs.find(l => {
            const lContent = (l.content || l.Content || '').toLowerCase();
            const eNameLower = oracleName.toLowerCase();
            const eContextLower = (e.context || '').toLowerCase();
            return lContent.includes(eNameLower) || lContent.includes(eContextLower);
          });
          
          if (matchingLog) {
            matchedLogText = matchingLog.content || matchingLog.Content || matchedLogText;
          }
        }

        const hasContext = entitiesMap[finalName].mentions.some(m => m.content === matchedLogText);
        if (!hasContext) {
          entitiesMap[finalName].mentions.push({
            date: e.date || getLocalTodayStr(),
            valence: e.valence || 'neutral',
            content: matchedLogText,
            mood: e.valence === 'positive' ? '6/7' : e.valence === 'negative' ? '2/7' : '4/7'
          });
        }
      });

      return Object.values(entitiesMap).map(p => {
        p.mentions.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        let posCount = 0;
        let negCount = 0;
        let neuCount = 0;
        p.mentions.forEach(m => {
          if (m.valence === 'positive') posCount++;
          else if (m.valence === 'negative') negCount++;
          else neuCount++;
        });
        
        let overallValence = 'neutral';
        if (posCount > negCount) overallValence = 'positive';
        if (negCount > posCount) overallValence = 'negative';

        let timeAgo = 'unknown';
        if (p.mentions.length > 0) {
          const diffTime = Math.abs(new Date() - new Date(p.mentions[0].date));
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          if (diffDays <= 1) timeAgo = 'today';
          else if (diffDays < 7) timeAgo = `${diffDays}d ago`;
          else timeAgo = `${Math.floor(diffDays / 7)}w ago`;
        }

        return {
          ...p,
          valence: overallValence,
          posCount: posCount,
          negCount: negCount,
          neuCount: neuCount,
          timeAgo: timeAgo,
          mentionCount: p.mentions.length
        };
      }).filter(p => p.mentionCount > 0);
    };

    // Date & Time Helpers in local device timezone to prevent offset shifting
    function getLocalTodayStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getLocalTimestampStr(customDateStr) {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const datePart = customDateStr || getLocalTodayStr();
      return `${datePart}T${hours}:${minutes}:${seconds}Z`;
    }

    function formatLocalDateStr(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // Local offline search scoring and ranking engine with date awareness
    function getSearchScore(log, query, queryWords) {
      const content = (log.content || log.Content || '').toLowerCase();
      const dateStr = (log.date || log.Date || '').toLowerCase(); // e.g. "2026-06-12"
      const emotion = (log.dominant_emotion || log.Dominant_Emotion || '').toLowerCase();
      const cleanQuery = query.toLowerCase().trim();

      if (!cleanQuery) return 0;

      let score = 0;

      // --- DATE PARSING MAP ---
      const monthsMap = {
        january: '01', jan: '01',
        february: '02', feb: '02',
        march: '03', mar: '03',
        april: '04', apr: '04',
        may: '05',
        june: '06', jun: '06',
        july: '07', jul: '07',
        august: '08', aug: '08',
        september: '09', sep: '09',
        october: '10', oct: '10',
        november: '11', nov: '11',
        december: '12', dec: '12'
      };

      // Relative Dates Resolution
      const today = new Date();
      const todayStr = formatLocalDateStr(today); // e.g. "2026-06-21"
      
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = formatLocalDateStr(yesterday);

      // 1. Direct exact phrase match in content
      if (content.includes(cleanQuery)) {
        score += 100;
      }

      // 2. Relative date phrase matching
      if (cleanQuery.includes('today') && dateStr === todayStr) {
        score += 150;
      }
      if (cleanQuery.includes('yesterday') && dateStr === yesterdayStr) {
        score += 150;
      }

      // 3. Natural date matching (e.g. "June 12" or "June")
      let queryMonthNum = null;
      Object.keys(monthsMap).forEach(mName => {
        if (cleanQuery.includes(mName)) {
          queryMonthNum = monthsMap[mName];
        }
      });

      // Extract day number (e.g., "12" in "june 12")
      let queryDayNum = null;
      const numberMatches = cleanQuery.match(/\b([1-9]|[12]\d|3[01])\b/g);
      if (numberMatches && numberMatches.length > 0) {
        queryDayNum = numberMatches[0].padStart(2, '0');
      }

      if (queryMonthNum) {
        if (dateStr.includes(`-${queryMonthNum}-`)) {
          score += 40; // match of month
          if (queryDayNum && dateStr.endsWith(`-${queryDayNum}`)) {
            score += 110; // total +150 for exact date match!
          }
        }
      }

      // 4. Exact standard date match (e.g. "2026-06-12" or "06-12")
      if (dateStr === cleanQuery) {
        score += 180;
      } else if (cleanQuery.length >= 5 && dateStr.includes(cleanQuery)) {
        score += 120;
      }

      // 5. Individual keyword matches
      let matchedWordsCount = 0;
      queryWords.forEach(word => {
        if (monthsMap[word] || word === 'today' || word === 'yesterday') return;

        let wordMatched = false;
        if (content.includes(word)) {
          score += 10;
          wordMatched = true;
        }
        if (dateStr.includes(word)) {
          score += 5;
          wordMatched = true;
        }
        if (emotion.includes(word)) {
          score += 5;
          wordMatched = true;
        }
        if (wordMatched) {
          matchedWordsCount++;
        }
      });

      // 6. Keyword completeness bonus
      const importantQueryWords = queryWords.filter(w => !monthsMap[w] && w !== 'today' && w !== 'yesterday');
      if (importantQueryWords.length > 0 && matchedWordsCount === importantQueryWords.length) {
        score += 30;
      }

      return score;
    }

    function App() {
      // 0. Supabase Auth States
      const [session, setSession] = useState(null);
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authNewPassword, setAuthNewPassword] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState(null);
      const [authSuccessMsg, setAuthSuccessMsg] = useState(null);
      const [authMode, setAuthMode] = useState('login'); // 'login' | 'signup' | 'forgot' | 'reset'

      // 1. Navigation View State
      const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard' | 'daily-pulse' | 'settings'
      
      // 2. Configuration State (LocalStorage & Supabase profile)
      const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('sb_gemini_key') || '');
      const [groqApiKey, setGroqApiKey] = useState(() => localStorage.getItem('sb_groq_key') || '');
      const [aiCallsToday, setAiCallsToday] = useState(0);

      // Supabase session listener & Password Recovery handler
      useEffect(() => {
        if (!supabase) return;

        // Check if user landed directly from a password recovery email link or with an error
        const activeHash = window.__INITIAL_HASH__ || window.location.hash;
        if (activeHash) {
          const hashParams = new URLSearchParams(activeHash.substring(1));
          const errorDescription = hashParams.get('error_description');
          const errorCode = hashParams.get('error_code');
          
          if (errorDescription || errorCode === 'otp_expired') {
            const cleanMsg = errorDescription 
              ? decodeURIComponent(errorDescription).replace(/\+/g, ' ') 
              : "This reset link is invalid or has expired. Please request a new one below.";
            setAuthError(cleanMsg);
            setAuthMode('forgot');
            setAuthSuccessMsg(null);
            if (window.history && window.history.replaceState) {
              window.history.replaceState(null, '', window.location.pathname);
            }
          } else if (activeHash.includes('type=recovery')) {
            setCurrentView('settings');
            // Allow Supabase to handle the implicit login from the hash, 
            // which will make session truthy and render the settings view.
          }
          // Clear initial hash so it doesn't trigger on subsequent re-renders if ignored
          window.__INITIAL_HASH__ = '';
        }
        
        // Initial session check
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
        });

        // Listen for auth state changes & recovery events
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          setSession(session);
          if (event === 'PASSWORD_RECOVERY') {
            setCurrentView('settings');
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      // 3. Core Logs State
      const [logs, setLogs] = useState([]);

      // Settings Password State
      const [settingsNewPassword, setSettingsNewPassword] = useState('');
      const [settingsPasswordLoading, setSettingsPasswordLoading] = useState(false);
      const [settingsPasswordMsg, setSettingsPasswordMsg] = useState(null);
      const [settingsPasswordError, setSettingsPasswordError] = useState(null);

      // 4. Sheets Sync State
      const [isSyncingSheets, setIsSyncingSheets] = useState(false);
      const [sheetsSyncError, setSheetsSyncError] = useState(null);

      // 5. Circle / Relationship View State
      const [circleSearchQuery, setCircleSearchQuery] = useState('');
      const [circleCategoryFilter, setCircleCategoryFilter] = useState('All');
      const [circleSortOrder, setCircleSortOrder] = useState('Recent');
      const [selectedCirclePerson, setSelectedCirclePerson] = useState(null);

      const [activeCategories, setActiveCategories] = useState(INITIAL_STATE_RULES);

      // 7. Daily Pulse State & Ref
      const [dailyPulseText, setDailyPulseText] = useState('');
      const [dailyPulseStatus, setDailyPulseStatus] = useState('idle'); // 'idle' | 'saving' | 'success' | 'error'
      const [selectedPulseDate, setSelectedPulseDate] = useState(getLocalTodayStr);
      const [pulseSearchQuery, setPulseSearchQuery] = useState('');
      const pulseTextareaRef = useRef(null);

      // 8. Q&A Box State

      // Inline CSV parser for fallback
      const parseCSV = (text) => {
        const lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const nextChar = text[i + 1];
          if (char === String.fromCharCode(34)) {
            if (inQuotes && nextChar === String.fromCharCode(34)) {
              row[row.length - 1] += String.fromCharCode(34);
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push("");
          } else if ((char === '\r' || char === '\n') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') {
              i++;
            }
            lines.push(row);
            row = [""];
          } else {
            row[row.length - 1] += char;
          }
        }
        if (row.length > 1 || row[0] !== "") {
          lines.push(row);
        }
        if (lines.length < 2) return [];
        const rawHeaders = lines[0].map(h => h.trim());
        const objects = [];
        for (let i = 1; i < lines.length; i++) {
          const values = lines[i];
          if (values.length === 1 && values[0] === "") continue;
          const obj = {};
          for (let j = 0; j < rawHeaders.length; j++) {
            const headerName = rawHeaders[j];
            const val = values[j] !== undefined ? values[j] : "";
            obj[headerName] = val;
          }
          objects.push(obj);
        }
        return objects;
      };

      // Robust Log Normalizer
      const normalizeLog = (log) => {
        // Detect and fix column offset mismatch (e.g. if sheet has only [Date, Stream, Content] and no headers)
        // in which case the Google Apps Script reads them as: timestamp=Date, date=Stream (e.g. "Journal"), stream=Content, content=undefined
        const isMismatched = 
          (log.timestamp && /^\d{4}-\d{2}-\d{2}/.test(String(log.timestamp))) &&
          (log.date && isNaN(new Date(log.date).getTime())) &&
          (!log.content);
        
        if (isMismatched) {
          log.content = log.stream; // Content was read into stream
          log.stream = log.date;    // Stream was read into date
          log.date = log.timestamp; // Date was read into timestamp
        }

        const getProp = (keys) => {
          for (const key of Object.keys(log)) {
            const normalizedKey = key.toLowerCase().trim().replace(/[\s_]+/g, '');
            for (const target of keys) {
              if (normalizedKey === target.toLowerCase().replace(/[\s_]+/g, '')) {
                return log[key];
              }
            }
          }
          return undefined;
        };

        const content = getProp(['content', 'text', 'journal', 'entry', 'log']) || '';
        const stream = getProp(['stream', 'streamtype', 'stream_type', 'category', 'type']) || 'Journal';
        let dateStr = getProp(['date', 'timestamp', 'time']);

        let dominant_emotion = getProp(['dominant_emotion', 'dominantemotion', 'emotion', 'state']);
        if (!dominant_emotion) {
          // Local keyword-matching fallback classification (since Sheets usually lack emotion column)
          dominant_emotion = 'Lazy';
          const lowerContent = content.toLowerCase();
          const categoriesToCheck = activeCategories || INITIAL_STATE_RULES;
          for (const cat of categoriesToCheck) {
            if (cat.keywords.some(kw => lowerContent.includes(kw))) {
              dominant_emotion = cat.name;
              break;
            }
          }
        }

        if (!dateStr && getProp(['timestamp'])) {
          try {
            const tsStr = String(getProp(['timestamp']));
            const match = tsStr.match(/^(\d{4}-\d{2}-\d{2})/);
            if (match) {
              dateStr = match[1];
            } else {
              const parsedDate = new Date(tsStr);
              if (!isNaN(parsedDate.getTime())) {
                dateStr = formatLocalDateStr(parsedDate);
              }
            }
          } catch (e) {}
        }
        if (!dateStr) {
          dateStr = getLocalTodayStr();
        } else {
          try {
            const match = String(dateStr).match(/^(\d{4}-\d{2}-\d{2})/);
            if (match) {
              dateStr = match[1];
            } else {
              const parsedDate = new Date(dateStr);
              if (!isNaN(parsedDate.getTime())) {
                dateStr = formatLocalDateStr(parsedDate);
              }
            }
          } catch (e) {}
        }

        return {
          date: dateStr,
          stream: stream,
          content: content,
          dominant_emotion: dominant_emotion
        };
      };

      // Voice Recording: Start capturing audio
      const startVoiceRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunksRef.current = [];
          const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          mediaRecorderRef.current = mediaRecorder;

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunksRef.current.push(event.data);
            }
          };

          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          setVoiceState('recording');
          setVoiceSeconds(0);

          // Start countdown timer
          let seconds = 0;
          voiceTimerRef.current = setInterval(() => {
            seconds += 1;
            setVoiceSeconds(seconds);
            if (seconds >= VOICE_MAX_SECONDS) {
              stopVoiceRecording();

          }, 1000);

        } catch (err) {
          console.error('Microphone access denied:', err);

        }

      // Voice Recording: Stop and send for transcription
      const stopVoiceRecording = () => {
        if (voiceTimerRef.current) {
          clearInterval(voiceTimerRef.current);
          voiceTimerRef.current = null;
        }

        const recorder = mediaRecorderRef.current;
        if (recorder && recorder.state !== 'inactive') {
          // Set state to transcribing before stopping so onstop doesn't race
          setVoiceState('transcribing');
          
          recorder.onstop = async () => {
            recorder.stream.getTracks().forEach(track => track.stop());
            
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            audioChunksRef.current = [];

            if (audioBlob.size < 100) {
              setVoiceState('idle');
              setVoiceSeconds(0);
              return;

            try {
              const formData = new FormData();

                            setSettingsPasswordError(null);
                            setSettingsPasswordMsg(null);
                            try {
                              const { error } = await supabase.auth.updateUser({ password: settingsNewPassword });
                              if (error) throw error;
                              setSettingsPasswordMsg("Password updated successfully.");
                              setSettingsNewPassword('');
                            } catch (err) {
                              setSettingsPasswordError(err.message);
                            } finally {
                              setSettingsPasswordLoading(false);
                            }
                          }}
                          disabled={settingsPasswordLoading || !settingsNewPassword}
                          class="whitespace-nowrap px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white text-xs font-bold rounded-xl transition-all shadow-lg shadow-emerald-900/20 flex items-center justify-center gap-2"
                        >
                          {settingsPasswordLoading ? <span class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> : 'Update Password'}
                        </button>
                      </div>
                    </div>
                  </div>
                  {/* Danger Zone */}
                  <div class="mt-6 border-t border-red-500/20 pt-6">
                    <h3 class="text-lg font-bold text-red-400 mb-2 flex items-center gap-2">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                      </svg>
                      Danger Zone
                    </h3>
                    <p class="text-xs text-gray-400 mb-4 font-medium">Irreversible actions that will permanently delete your cognitive log records.</p>
                    
                    <div class="bg-red-500/5 border border-red-500/20 rounded-xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                      <div>
                        <p class="text-xs font-bold text-white leading-none mb-1">Delete Entire Vault Data</p>
                        <p class="text-[11px] text-gray-400 mt-1">This will permanently delete all your logged notes, journals, and history.</p>
                      </div>

                      <button
                        onClick={deleteAllAppData}
                        class="px-4 py-2 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white text-xs font-bold rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-red-900/20"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Delete All Data
                      </button>
                    </div>
                  </div>

                </div>
              </div>
            )}

            {/* VIEW 4: YOUR CIRCLE */}
            {currentView === 'circle' && (
              <div class="max-w-4xl mx-auto">
                {!selectedCirclePerson ? (
                  // Grid View
                  <div>
                    {/* Header */}
                    <div class="mb-6">
                      <span class="text-xs font-bold tracking-widest text-purple-400 uppercase font-mono block mb-1">YOUR CIRCLE</span>
                      <h2 class="text-3xl font-black text-white tracking-tight">The people & entities in your life.</h2>
                      <p class="text-sm text-gray-400 mt-1.5 font-medium">
                        {circlePeople.length} {circlePeople.length === 1 ? 'member/entity has' : 'members/entities have'} come up since May 2026. The ones who keep coming back are your Circle.
                      </p>
                    </div>

                    {/* Search and Filters */}
                    <div class="flex flex-col gap-4 mb-6">
                      {/* Search Bar */}
                      <div class="relative flex items-center">
                        <svg class="w-4 h-4 text-gray-500 absolute left-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input
                          type="text"
                          value={circleSearchQuery}
                          onChange={(e) => setCircleSearchQuery(e.target.value)}
                          placeholder="Find someone"
                          class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-5 py-3 text-sm focus:outline-none focus:border-purple-500 transition-all text-white placeholder-gray-500 font-medium"
                        />
                      </div>

                      {/* Filter Pills and Sort */}
                      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        {/* Category Pills */}
                        <div class="flex flex-wrap gap-2">
                          {['All', 'Family', 'Partner', 'Friends', 'Work', 'Product', 'Website', 'Software', 'Project'].map(cat => (
                            <button
                              key={cat}
                              onClick={() => setCircleCategoryFilter(cat)}
                              class={`px-4 py-1.5 rounded-full text-xs font-bold border transition-all ${
                                circleCategoryFilter === cat
                                  ? 'bg-white text-black border-white'
                                  : 'bg-white/5 text-gray-400 border-white/10 hover:bg-white/10 hover:text-white'
                              }`}>
                              {cat}
                            </button>
                          ))}
                        </div>

                        {/* Sort Order */}
                        <div class="flex items-center gap-3 text-xs">
                          <span class="text-gray-500 font-bold uppercase tracking-wider">SORT</span>
                          {['Recent', 'Most here', 'A -> Z'].map(sort => (
                            <button
                              key={sort}
                              onClick={() => setCircleSortOrder(sort)}
                              class={`font-bold transition-all ${
                                circleSortOrder === sort
                                  ? 'text-yellow-400 underline decoration-2 underline-offset-4'
                                  : 'text-gray-400 hover:text-white'
                              }`}>
                              {sort}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Circle Grid */}
                    {filteredCirclePeople.length > 0 ? (
                      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {filteredCirclePeople.map(person => {
                          const initials = person.name.slice(0, 2).toUpperCase();
                          const toneColor = 
                            person.valence === 'positive' ? 'bg-green-500/10 border-green-500/20 text-green-400 shadow-green-500/10' :
                            person.valence === 'negative' ? 'bg-red-500/10 border-red-500/20 text-red-400 shadow-red-500/10' :
                            'bg-gray-500/10 border-gray-500/20 text-gray-400 shadow-gray-500/10';
                            
                          const dotColor = 
                            person.valence === 'positive' ? 'bg-green-500' :
                            person.valence === 'negative' ? 'bg-red-500' :
                            'bg-gray-500';

                          return (
                            <button
                              key={person.name}
                              onClick={() => setSelectedCirclePerson(person)}
                              class="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between hover:bg-white/[0.08] hover:border-white/20 transition-all text-left group">
                              <div class="flex items-center gap-3.5">
                                {/* Initial Avatar */}
                                <div class={`w-12 h-12 rounded-full flex items-center justify-center font-display font-bold text-lg border ${toneColor}`}>
                                  {person.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                  <h4 class="font-bold text-white group-hover:text-purple-400 transition-all text-sm">{person.name}</h4>
                                  <span class="text-xs text-gray-400 font-medium">
                                    {person.mentionCount} {person.mentionCount === 1 ? 'mention' : 'mentions'} • {person.timeAgo}
                                  </span>
                                </div>
                              </div>
                              <span class={`w-2 h-2 rounded-full ${dotColor} mr-1`}></span>
                            </button>
                          );
                        })}
                      </div>
                    ) : (
                      <div class="text-center py-12 border border-dashed border-white/10 rounded-2xl bg-white/[0.01]">
                        <p class="text-sm text-gray-500">No members in this circle matching your filters.</p>
                      </div>
                    )}
                  </div>
                ) : (
                  // Detail View
                  <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-6">
                    {/* Back Button */}
                    <button
                      onClick={() => setSelectedCirclePerson(null)}
                      class="flex items-center gap-1.5 text-xs font-bold text-gray-400 hover:text-white mb-6 uppercase tracking-wider font-mono">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                      </svg>
                      Circle
                    </button>

                    {/* Profile Header */}
                    <div class="flex items-center gap-4 mb-8">
                      <div class={`w-16 h-16 rounded-full flex items-center justify-center font-display font-black text-2xl border ${
                        activeCirclePerson.valence === 'positive' ? 'bg-green-500/10 border-green-500/20 text-green-400' :
                        activeCirclePerson.valence === 'negative' ? 'bg-red-500/10 border-red-500/20 text-red-400' :
                        'bg-gray-500/10 border-gray-500/20 text-gray-400'
                      }`}>
                        {activeCirclePerson.name.charAt(0).toUpperCase()}
                      </div>
                      <div class="flex-grow">
                        <div class="flex flex-wrap items-center justify-between gap-3">
                          <div>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-0.5">
                              {activeCirclePerson.category.toLowerCase()} • in your circle
                            </span>
                            <h3 class="text-2xl font-black text-white tracking-tight">{activeCirclePerson.name}</h3>
                          </div>
                          
                          {/* Manual Category Dropdown Selector */}
                          <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-1.5 backdrop-blur-md">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Category:</span>
                            <select
                              value={activeCirclePerson.category}
                              onChange={(e) => handleUpdateEntityCategory(activeCirclePerson.name, e.target.value)}
                              class="bg-transparent text-xs font-bold text-cyan-400 focus:outline-none cursor-pointer">
                              {['Family', 'Partner', 'Friends', 'Work', 'Product', 'Website', 'Software', 'Project'].map(cat => (
                                <option key={cat} value={cat} class="bg-zinc-900 text-white">{cat}</option>
                              ))}
                            </select>
                          </div>
                        </div>
                        <span class="text-xs text-gray-500 font-mono block mt-1">
                          {activeCirclePerson.mentionCount} {activeCirclePerson.mentionCount === 1 ? 'mention' : 'mentions'} • since May 2026
                        </span>
                      </div>
                    </div>

                    {/* Stats Layout */}
                    <div class="flex flex-col gap-6">
                      {/* Timeline Moment Box */}
                      <div class="bg-black/30 border border-white/5 rounded-xl p-5">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest block mb-4">HOW YOU FEEL WHEN THEY COME UP</span>
                        
                        {/* Dot representation timeline */}
                        <div class="relative flex items-center justify-between px-4 py-2 mb-2">
                          <div class="absolute left-4 right-4 h-0.5 border-t border-dashed border-white/10"></div>
                          {activeCirclePerson.mentions.map((m, idx) => (
                            <div
                              key={idx}
                              class={`w-2.5 h-2.5 rounded-full relative z-10 transition-all cursor-pointer hover:scale-125 ${
                                m.valence === 'positive' ? 'bg-green-500 shadow shadow-green-500/40' :
                                m.valence === 'negative' ? 'bg-red-500 shadow shadow-red-500/40' :
                                'bg-gray-500 shadow shadow-gray-500/40'
                              }`}
                              title={`${m.date}: ${m.valence}`}></div>
                          ))}
                        </div>
                        <span class="text-[10px] text-gray-400 italic font-mono block text-right mt-1">
                          Across {activeCirclePerson.mentionCount} {activeCirclePerson.mentionCount === 1 ? 'moment' : 'moments'}
                        </span>
                      </div>

                      {/* Tone analysis bar */}
                      <div class="bg-black/30 border border-white/5 rounded-xl p-5">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest block mb-3">TONE OF YOUR MENTIONS</span>
                        
                        {/* Horizontal Progress Bar */}
                        <div class="h-2 rounded-full overflow-hidden flex bg-white/5 mb-3">
                          {activeCirclePerson.posCount > 0 && (
                            <div
                              style={{ width: `${(activeCirclePerson.posCount / activeCirclePerson.mentionCount) * 100}%` }}
                              class="bg-green-500"></div>
                          )}
                          {activeCirclePerson.neuCount > 0 && (
                            <div
                              style={{ width: `${(activeCirclePerson.neuCount / activeCirclePerson.mentionCount) * 100}%` }}
                              class="bg-gray-500"></div>
                          )}
                          {activeCirclePerson.negCount > 0 && (
                            <div
                              style={{ width: `${(activeCirclePerson.negCount / activeCirclePerson.mentionCount) * 100}%` }}
                              class="bg-red-500"></div>
                          )}
                        </div>

                        {/* Tone counts labels */}
                        <div class="flex justify-between text-[10px] text-gray-400 font-mono">
                          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>{activeCirclePerson.posCount} positive</span>
                          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span>{activeCirclePerson.neuCount} neutral</span>
                          <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>{activeCirclePerson.negCount} negative</span>
                        </div>
                      </div>

                      {/* Synthesis Banner */}
                      <div class="bg-purple-500/5 border border-purple-500/10 rounded-xl p-4">
                        <p class="text-xs text-purple-300 leading-relaxed font-medium">
                          {activeCirclePerson.name} has shown up {activeCirclePerson.mentionCount === 1 ? 'once' : 'once or twice'}. 
                          {activeCirclePerson.mentionCount <= 2 ? " Mention them again and I'll start noticing patterns." : " Showing clear recurrent behavioral connections."}
                        </p>
                      </div>

                      {/* Mentions logs timeline */}
                      <div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-3 font-mono">WHEN THEY APPEAR</span>
                        <div class="flex flex-col gap-3">
                          {activeCirclePerson.mentions.map((m, idx) => (
                            <div key={idx} class="bg-black/20 border border-white/5 rounded-xl p-4">
                              <div class="flex justify-between items-center mb-2 pb-1.5 border-b border-white/5">
                                <span class="text-xs font-mono font-bold text-gray-400">{m.date}</span>
                                <div class="flex gap-1.5">
                                  <span class={`text-[9px] px-1.5 py-0.5 rounded font-bold uppercase ${
                                    m.valence === 'positive' ? 'bg-green-500/10 text-green-400' :
                                    m.valence === 'negative' ? 'bg-red-500/10 text-red-400' :
                                    'bg-gray-500/10 text-gray-400'
                                  }`}>{m.valence}</span>
                                  <span class="text-[9px] px-1.5 py-0.5 rounded bg-white/5 text-gray-400 font-mono">mood {m.mood}</span>
                                </div>
                              </div>
                              <p class="text-xs text-gray-300 leading-relaxed font-medium">{m.content}</p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* DAY SPOTLIGHT MODAL */}
          {selectedSpotlightDay && (
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div 
                onClick={() => setSelectedSpotlightDay(null)}
                class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
              
              <div class="relative bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-xl overflow-hidden shadow-2xl relative z-10">
                <div class="flex justify-between items-center border-b border-white/10 p-5">
                  <div>
                    <h3 class="text-lg font-bold text-white">Day Spotlight</h3>
                    <p class="text-xs text-gray-400 font-mono mt-0.5">{selectedSpotlightDay.date}</p>
                  </div>
                  <button 
                    onClick={() => setSelectedSpotlightDay(null)}
                    class="text-gray-400 hover:text-white p-1 hover:bg-white/5 rounded-lg transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <div class="p-6 flex flex-col gap-4 max-h-[400px] overflow-y-auto">
                  {selectedSpotlightDay.logs && selectedSpotlightDay.logs.length > 0 ? (
                    selectedSpotlightDay.logs.map((log, idx) => (
                      <div key={idx} class="bg-white/[0.01] border border-white/5 rounded-xl p-4 flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                          <span class="text-[10px] uppercase font-mono font-bold tracking-widest text-gray-500">
                            Stream: {log.stream || 'Journal'}
                          </span>
                          <span class={`text-[10px] font-bold px-2 py-0.5 rounded-full ${resolveStateStyling(log.dominant_emotion).textColor}`}>
                            State: {log.dominant_emotion || 'Lazy'}
                          </span>
                        </div>
                        <p class="text-sm leading-relaxed text-gray-200">
                          {log.content}
                        </p>
                      </div>
                    ))
                  ) : (
                    <p class="text-sm text-gray-500 text-center py-6">No entries recorded for this spotlight day.</p>
                  )}
                </div>

                <div class="bg-zinc-950 border-t border-white/10 p-4 flex justify-between items-center">
                  <span class="text-[10px] text-gray-500 uppercase tracking-widest font-mono">SPIN SPOTLIGHT ENGINE v2.0</span>
                  <button
                    onClick={() => setSelectedSpotlightDay(null)}
                    class="px-4 py-2 bg-white/10 hover:bg-white/15 rounded-xl text-xs font-semibold text-white transition-all">
                    Dismiss
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Floating Bottom Dock Menu */}
          <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-black/60 border border-white/10 backdrop-blur-xl rounded-2xl px-4 py-2.5 shadow-2xl flex items-center gap-1.5 sm:gap-2">
            {[
              { id: 'dashboard', label: 'Cockpit', icon: '📊' },
              { id: 'daily-pulse', label: 'Today\'s Pulse', icon: '📝' },
              { id: 'circle', label: 'Circle & DNA', icon: '🧬' },
              { id: 'settings', label: 'Settings', icon: '⚙️' }
            ].map(tab => {
              const isActive = currentView === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => setCurrentView(tab.id)}
                  class={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition-all relative duration-300 group ${
                    isActive 
                      ? 'bg-gradient-to-r from-cyan-500/20 to-purple-500/20 border border-white/10 text-white shadow shadow-purple-500/10'
                      : 'border border-transparent text-gray-400 hover:text-white hover:bg-white/5'
                  }`}
                >
                  <span class={`text-sm transition-transform duration-300 group-hover:scale-110 ${isActive ? 'scale-110' : ''}`}>{tab.icon}</span>
                  <span class="hidden md:inline">{tab.label}</span>
                </button>
              );
            })}
          </div>

          {/* Global Footer */}
          <footer class="mt-8 border-t border-white/5 pt-6 text-center">
            <p class="text-xs text-gray-600">Split-Brain Portal Dashboard &copy; 2026. Designed for premium cognitive logging.</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
